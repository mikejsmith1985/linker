services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: linker
      POSTGRES_PASSWORD: linker
      POSTGRES_DB: linker
    ports:
      - "5432:5432"
    volumes:
      - linker_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linker -d linker"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://linker:linker@db:5432/linker?sslmode=disable
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-opus-4-8}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_REPOS: ${GITHUB_REPOS:-}
      BUFFER_ACCESS_TOKEN: ${BUFFER_ACCESS_TOKEN:-}
      BUFFER_PROFILE_ID: ${BUFFER_PROFILE_ID:-}
      POLL_INTERVAL: ${POLL_INTERVAL:-15m}
      POST_MIN_INTERVAL: ${POST_MIN_INTERVAL:-24h}
      HTTP_ADDR: ":8080"
    ports:
      - "8080:8080"

volumes:
  linker_pgdata:
