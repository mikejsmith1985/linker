services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: linker
      POSTGRES_PASSWORD: linker
      POSTGRES_DB: linker
    ports:
      - "5432:5432"
    volumes:
      - linker_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linker -d linker"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://linker:linker@db:5432/linker?sslmode=disable
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-opus-4-8}
      ADZUNA_APP_ID: ${ADZUNA_APP_ID:-}
      ADZUNA_APP_KEY: ${ADZUNA_APP_KEY:-}
      RAPIDAPI_KEY: ${RAPIDAPI_KEY:-}
      ENABLE_BROWSER_SOURCE: ${ENABLE_BROWSER_SOURCE:-}
      HTTP_ADDR: ":8080"
    ports:
      - "8080:8080"

volumes:
  linker_pgdata:
